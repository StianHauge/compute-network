version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: compute_admin
      POSTGRES_PASSWORD: compute_password
      POSTGRES_DB: compute_network
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  nats:
    image: nats:2.9-alpine
    command: ["-js"]
    ports:
      - "4222:4222"
      
  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: control_plane/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://compute_admin:compute_password@postgres:5432/compute_network
      - REDIS_URL=redis://redis:6379/0
      - NATS_URL=nats://nats:4222
    depends_on:
      - postgres
      - redis
      - nats

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - api

volumes:
  postgres_data:
